name: Mission Benchmark

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    paths:
      - "**/*.miz"

jobs:
  benchmark:
    name: Benchmark Mission Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install afterburner
        run: pip install git+https://github.com/IT-Dev-Group-6/dcs-afterburner@master

      - name: Find changed .miz files
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }}
          FILES=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD | grep '\.miz$' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Generate reports for changed files
        id: report
        if: steps.changed.outputs.files != ''
        run: |
          mkdir -p reports
          FAILED=0
          > /tmp/combined.md
          for f in ${{ steps.changed.outputs.files }}; do
            STEM=$(basename "$f" .miz)
            afterburner report "$f" --format md > "reports/${STEM}.md"
            cat "reports/${STEM}.md" >> /tmp/combined.md
            if ! afterburner analyze "$f" --fail-on critical; then
              FAILED=1
            fi
          done
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Commit reports to branch
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: update benchmark reports"
          git push origin HEAD:${{ github.head_ref }}

      - name: Post PR comment
        if: steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '## Mission Benchmark Report\n\n' + fs.readFileSync('/tmp/combined.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on critical findings
        if: steps.changed.outputs.files != '' && steps.report.outputs.failed == '1'
        run: |
          echo "Critical findings detected. Merge blocked — review the PR comment for details."
          exit 1
