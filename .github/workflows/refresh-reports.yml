name: Refresh All Reports

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    name: Regenerate all mission reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install afterburner
        run: pip install git+https://github.com/IT-Dev-Group-6/dcs-afterburner@master

      - name: Generate reports for missions without one
        run: |
          mkdir -p reports
          find . -name "*.miz" -not -path "./.git/*" | while read f; do
            STEM=$(basename "$f" .miz)
            if [ ! -f "reports/${STEM}.md" ]; then
              echo "Generating report for $STEM"
              afterburner report "$f" --format md > "reports/${STEM}.md"
            fi
          done

      - name: Fetch bench results
        run: python .github/scripts/fetch_bench_results.py

      - name: Regenerate reports with bench data
        run: python .github/scripts/refresh_bench_reports.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ bench-results/
          git diff --staged --quiet && echo "No changes to commit." || git commit -m "chore: refresh all benchmark reports"
          git pull --rebase origin main
          git push

      - name: Trigger pages deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
